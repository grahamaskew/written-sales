<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revenue Recognition Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --accent:       #6687e1;
    --accent-light: #eaeefc;
    --accent-mid:   #a8b8ee;
    --accent-dark:  #3a5abf;
    --text-primary: #1c2333;
    --text-muted:   #6b7a90;
    --text-faint:   #9aaabb;
    --bg-page:      #f2f4f8;
    --bg-card:      #ffffff;
    --bg-subtle:    #eef0f6;
    --border:       #dde1ee;
    --border-light: #eaedf5;
    --error:        #c94a2e;
    --error-light:  #fdf0ee;
    --error-border: #f0c4bc;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif; font-size: 15px; background: var(--bg-page); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  .app { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .app-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.75rem; gap: 12px; }
  .app-header-left { display: flex; align-items: center; gap: 12px; }
  .app-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
  .app-title { font-size: 21px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; letter-spacing: -0.2px; }
  .app-sub { font-size: 13px; color: var(--text-muted); }
  .tabs { display: flex; gap: 2px; border-bottom: 1.5px solid var(--border); margin-bottom: 1.25rem; }
  .tab-btn { background: none; border: none; padding: 8px 20px; font-size: 13.5px; font-weight: 400; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1.5px; font-family: inherit; transition: color .15s; }
  .tab-btn.active { color: var(--accent-dark); font-weight: 600; border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--text-primary); }
  .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .section-title { font-size: 10.5px; font-weight: 600; color: var(--accent); letter-spacing: .09em; text-transform: uppercase; margin-bottom: 1rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .lbl { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; font-weight: 400; }
  .lbl-hint { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .input-wrap { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; background: var(--bg-card); transition: border-color .15s; }
  .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(102,135,225,.13); }
  .input-prefix { padding: 0 9px; font-size: 13px; color: var(--accent); background: var(--accent-light); border-right: 1px solid var(--border-light); white-space: nowrap; height: 100%; display: flex; align-items: center; flex-shrink: 0; font-weight: 500; }
  .input-wrap input { border: none; background: transparent; padding: 7px 10px; width: 100%; font-size: 14px; color: var(--text-primary); outline: none; font-family: inherit; }
  .input-wrap input[type=number]::-webkit-inner-spin-button,
  .input-wrap input[type=number]::-webkit-outer-spin-button { opacity: .4; }
  select.styled { width: 100%; padding: 7px 10px; font-size: 14px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg-card); color: var(--text-primary); font-family: inherit; outline: none; cursor: pointer; }
  select.styled:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(102,135,225,.13); }
  input[type=text].styled { border: none; border-bottom: 1.5px solid var(--border); background: transparent; font-size: 15px; font-weight: 600; color: var(--text-primary); padding: 3px 0; outline: none; width: 100%; font-family: inherit; }
  input[type=text].styled:focus { border-bottom-color: var(--accent); }
  input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
  .metric-cards { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
  .metric-card { background: var(--accent-light); border: 1px solid var(--border); border-radius: 9px; padding: 1rem; flex: 1; min-width: 140px; }
  .metric-card.primary { background: var(--accent); border-color: var(--accent); }
  .metric-card.primary .mc-label { color: rgba(255,255,255,.75); }
  .metric-card.primary .mc-value { color: #fff; }
  .metric-card.primary .mc-sub { color: rgba(255,255,255,.65); }
  .metric-card .mc-label { font-size: 11.5px; color: var(--text-muted); margin-bottom: 5px; }
  .metric-card .mc-value { font-size: 21px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.3px; }
  .metric-card .mc-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 3px; }
  .deduction-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
  .deduction-row.total-row { border-bottom: none; padding-top: 12px; font-size: 14px; }
  .info-box { background: var(--accent-light); border: 1px solid var(--border); border-radius: 7px; padding: 9px 12px; font-size: 13px; margin-top: 10px; color: var(--text-muted); }
  .info-box strong { color: var(--accent-dark); }
  .sub-panel { background: var(--bg-subtle); border-radius: 8px; padding: 12px; margin-top: 6px; border: 1px solid var(--border-light); }
  .sub-panel-title { font-size: 11.5px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
  .phase-dot { width: 9px; height: 9px; border-radius: 2px; display: inline-block; margin-right: 5px; flex-shrink: 0; }
  .btn { border: 1px solid var(--border); background: transparent; border-radius: 7px; padding: 7px 15px; font-size: 13.5px; cursor: pointer; color: var(--text-primary); font-family: inherit; transition: background .12s, border-color .12s; font-weight: 400; }
  .btn:hover { background: var(--bg-subtle); border-color: var(--accent-mid); }
  .btn-remove { font-size: 12px; color: var(--text-muted); padding: 4px 10px; }
  .btn-reset { font-size: 13px; color: var(--error); border-color: var(--error-border); padding: 6px 14px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .btn-reset:hover { background: var(--error-light); }
  .btn-pdf { font-size: 13px; color: #fff; background: var(--accent); border-color: var(--accent); padding: 6px 16px; white-space: nowrap; flex-shrink: 0; font-weight: 500; border-radius: 7px; border: 1px solid var(--accent); cursor: pointer; font-family: inherit; }
  .btn-pdf:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .mix-status { font-size: 13px; margin-left: auto; }
  .mix-ok { color: var(--text-muted); }
  .mix-err { color: var(--error); }
  .pct-err { font-size: 12px; color: var(--error); margin-top: 8px; }
  .chart-wrap { overflow-x: auto; }
  .chart-legend { display: flex; gap: 16px; font-size: 12px; color: var(--text-muted); margin-top: 8px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
  .phase-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  .phase-table th { padding: 6px 8px; font-weight: 600; font-size: 11.5px; border-bottom: 1.5px solid var(--border); color: var(--text-muted); }
  .phase-table td { padding: 8px; border-bottom: 1px solid var(--border-light); }
  .phase-table tr.total-row td { border-top: 1.5px solid var(--border); border-bottom: none; background: var(--accent-light); font-weight: 600; color: var(--accent-dark); }
  .text-right { text-align: right; }
  .text-muted { color: var(--text-muted); }
  .notice { padding: 2rem; text-align: center; color: var(--text-muted); font-size: 14px; }
  .helper-text { font-size: 13px; color: var(--text-muted); margin-bottom: .75rem; line-height: 1.5; }
  .mt-8 { margin-top: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .name-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
  .add-remove-row { display: flex; align-items: center; margin-bottom: 1rem; }
  .ytd-toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
  .print-only { display: none; }
  @media (max-width: 600px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .metric-card { min-width: 120px; }
    .app-header { flex-direction: column; }
    .app-header-left { flex-wrap: wrap; }
  }
  @media print {
    @page { margin: 16mm 12mm; size: A4 portrait; }
    body { background: #fff !important; font-size: 12px; }
    .app { max-width: 100%; padding: 0; }
    .tabs, .btn-reset, .btn-pdf, .add-remove-row, .btn-remove, .ytd-toggle-row input[type=checkbox] { display: none !important; }
    .print-only { display: block !important; }
    .screen-only { display: none !important; }
    .print-page-break { page-break-before: always; break-before: page; margin-top: 0; }
    .section { border: 1px solid #ccc; border-radius: 0; margin-bottom: 8px; padding: 10px; }
    .section-title { font-size: 9px; }
    .metric-cards { flex-wrap: wrap; gap: 6px; }
    .metric-card { min-width: 110px; padding: 8px; }
    .metric-card.primary { background: #eaeefc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .metric-card.primary .mc-label, .metric-card.primary .mc-value, .metric-card.primary .mc-sub { color: #3a5abf !important; }
    .sub-panel { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .phase-table tr.total-row td { background: #eaeefc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .input-prefix { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .chart-wrap { overflow: visible; }
    .chart-wrap svg { width: 100% !important; min-width: 0 !important; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: repeat(3,1fr); }
    .app-logo { width: 28px; height: 28px; }
    .app-title { font-size: 15px; }
    .app-sub { font-size: 11px; }
    .phase-table th, .phase-table td { font-size: 11px; padding: 4px 6px; }
    .print-section-label { font-size: 10px; font-weight: 600; color: #6687e1; letter-spacing: .08em; text-transform: uppercase; border-bottom: 1.5px solid #dde1ee; padding-bottom: 5px; margin-bottom: 10px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>

      setCurrentMonth(preYTDMonth.current);
    }
    setIncludeYTD(checked);
  }

  function handleReset() {
    setAnnualGoal(3000000); setCurrentMonth(TODAY_MONTH);
    preYTDMonth.current = TODAY_MONTH;
    setIncludeYTD(false); setYtdWritten(0); setYtdRecognized(0);
    setCarryoverTotal(0); setCarryoverRecPct(50); setServicePct(0);
    setProjectTypes(DEFAULT_TYPES.map(function(t){return Object.assign({},t);}));
    setNextId(3); setActiveTab("setup");
  }

  function addType() {
    if (projectTypes.length >= 5) return;
    setProjectTypes(function(prev) {
      return prev.concat([{ id: nextId, name: "Project type " + nextId, avgValue: 50000, duration: 8, prewireMonth: 1, roughMonth: 4, finalMonth: 8, prewirePct: 25, roughPct: 35, finalPct: 40, mixPct: 0 }]);
    });
    setNextId(function(n) { return n + 1; });
  }
  function removeType(id) { setProjectTypes(function(prev) { return prev.filter(function(t){return t.id!==id;}); }); }
  function updateType(id, field, val) {
    setProjectTypes(function(prev) { return prev.map(function(t){ return t.id===id ? Object.assign({},t,{[field]:val}) : t; }); });
  }

  var totalMix = projectTypes.reduce(function(s,t){return s+t.mixPct;},0);

  var calc = useMemo(function() {
    if (!projectTypes.length) return null;
    var norm = projectTypes.map(function(t) {
      return Object.assign({},t,{ normMix: totalMix>0 ? t.mixPct/totalMix : 1/projectTypes.length });
    });
    var wAvg = norm.reduce(function(s,t){return s+t.avgValue*t.normMix;},0);
    var svcRev = annualGoal*(servicePct/100);
    var coRev = carryoverTotal*(carryoverRecPct/100);
    var ytdRec = includeYTD ? ytdRecognized : 0;
    var needFromSales = Math.max(0, annualGoal - svcRev - coRev - ytdRec);
    var moRevNeeded = needFromSales / 12;

    function revPct(offset, t) {
      var r = 0;
      if (Math.round(offset*10)===Math.round(t.prewireMonth*10)) r+=t.prewirePct/100;
      if (Math.round(offset*10)===Math.round(t.roughMonth*10))   r+=t.roughPct/100;
      if (Math.round(offset*10)===Math.round(t.finalMonth*10))   r+=t.finalPct/100;
      return r;
    }
    function buildSched(wm, t, cv) {
      var out={}, steps=Math.round(t.duration*10);
      for (var s=1;s<=steps;s++) {
        var off=s/10, rev=revPct(off,t)*cv;
        if (rev>0) { var m=Math.ceil(wm+off-1); out[m]=(out[m]||0)+rev; }
      }
      return out;
    }
    var inYearYield=0;
    for (var wm=1;wm<=12;wm++) {
      norm.forEach(function(t) {
        var sc=buildSched(wm,t,t.normMix);
        Object.keys(sc).forEach(function(m){ if(Number(m)>=1&&Number(m)<=12) inYearYield+=sc[m]; });
      });
    }
    var moWritten = inYearYield>0 ? needFromSales/inYearYield : 0;
    var revByMo={};
    for (var i=1;i<=36;i++) revByMo[i]=0;
    for (var wm2=1;wm2<=36;wm2++) {
      norm.forEach(function(t) {
        var c2=(moWritten*t.normMix)/t.avgValue;
        var sc2=buildSched(wm2,t,t.avgValue*c2);
        Object.keys(sc2).forEach(function(m){ if(revByMo[m]!==undefined) revByMo[m]+=sc2[m]; });
      });
    }
    if (includeYTD && ytdWritten>0 && currentMonth>1) {
      for (var wm3=1;wm3<currentMonth;wm3++) {
        norm.forEach(function(t) {
          var cv3=(ytdWritten/(currentMonth-1))*t.normMix;
          var sc3=buildSched(wm3,t,cv3);
          Object.keys(sc3).forEach(function(m){ if(revByMo[m]!==undefined) revByMo[m]+=sc3[m]; });
        });
      }
    }
    var projInYear=Object.keys(revByMo).filter(function(m){return Number(m)>=1&&Number(m)<=12;}).reduce(function(s,m){return s+revByMo[m];},0);
    return {
      moWritten: moWritten,
      contractsPer: moWritten/wAvg,
      needFromSales: needFromSales,
      moRevNeeded: moRevNeeded,
      yieldPct: inYearYield>0 ? (inYearYield/12)*100 : 0,
      projInYear: projInYear,
      svcRev: svcRev,
      coRev: coRev,
      ytdRec: ytdRec,
      revArr: Object.keys(revByMo).map(function(m){return {month:Number(m),revenue:revByMo[m]};})
    };
  }, [annualGoal, currentMonth, ytdWritten, ytdRecognized, includeYTD, carryoverTotal, carryoverRecPct, servicePct, projectTypes, totalMix]);

  var allPhaseErrors = projectTypes.reduce(function(acc,t) {
    if (t.prewireMonth>t.duration) acc.push({name:t.name,msg:"Prewire month "+t.prewireMonth+" exceeds duration of "+t.duration+" months"});
    if (t.roughMonth>t.duration)   acc.push({name:t.name,msg:"Rough-in month "+t.roughMonth+" exceeds duration of "+t.duration+" months"});
    if (t.finalMonth>t.duration)   acc.push({name:t.name,msg:"Final month "+t.finalMonth+" exceeds duration of "+t.duration+" months"});
    return acc;
  },[]);

  var tabs = [{id:"setup",label:"Setup"},{id:"projects",label:"Project types"},{id:"results",label:"Results"}];

  function renderSetup() {
    return h(Fragment, null,
      h(Sec, { title: "Annual goal" },
        h("div", { className: "grid-2" },
          h("div", null, h(Lbl, null, "Annual revenue goal"), h(DollarInput, { value: annualGoal, onChange: setAnnualGoal })),
          h("div", null,
            h(Lbl, null, "Current month"),
            h("select", { className: "styled", value: currentMonth, onChange: function(e){setCurrentMonth(Number(e.target.value));} },
              MONTH_OPTIONS.map(function(o){ return h("option",{key:o.value,value:o.value},o.label); })
            )
          )
        )
      ),
      h(Sec, { title: "Service revenue" },
        h("p", { className: "helper-text" }, "Service revenue is recognized independently of written sales and is deducted from the sales-driven target."),
        h("div", { className: "grid-2", style: { alignItems: "end" } },
          h("div", null,
            h(Lbl, { hint: "As a percentage of the annual revenue goal" }, "Service revenue %"),
            h(NumInput, { value: servicePct, onChange: function(v){setServicePct(Math.min(100,Math.max(0,v)));}, prefix: "%", min: 0, max: 100, clearOnZero: true })
          ),
          h("div", { className: "info-box" }, "Service revenue: ", h("strong", null, fmt(annualGoal*servicePct/100)))
        )
      ),
      h(Sec, { title: "Carryover pipeline" },
        h("p", { className: "helper-text" }, "Work-in-progress contracts carried into this year from the prior year."),
        h("div", { className: "grid-2" },
          h("div", null,
            h(Lbl, { hint: "Total contract value of WIP carried from prior year" }, "Carryover pipeline total"),
            h(DollarInput, { value: carryoverTotal, onChange: setCarryoverTotal })
          ),
          h("div", null,
            h(Lbl, { hint: "Portion expected to be recognized as revenue this year" }, "% recognized this year"),
            h(NumInput, { value: carryoverRecPct, onChange: function(v){setCarryoverRecPct(Math.min(100,Math.max(0,v)));}, prefix: "%", min: 0, max: 100 })
          )
        ),
        carryoverTotal > 0 ? h("div", { className: "info-box mt-8" }, "Carryover revenue applied this year: ", h("strong", null, fmt(carryoverTotal*carryoverRecPct/100))) : null
      ),
      h(Sec, { title: "Year-to-date actuals" },
        h("div", { className: "ytd-toggle-row" },
          h("input", { type: "checkbox", id: "ytd-chk", checked: includeYTD, onChange: function(e){handleYTDToggle(e.target.checked);} }),
          h("label", { htmlFor: "ytd-chk", style: { fontSize: 14, cursor: "pointer", color: "var(--text-muted)" } }, "Include YTD actuals in calculation")
        ),
        includeYTD ? h("div", { className: "grid-2" },
          h("div", null, h(Lbl, null, "YTD written sales contracted"), h(DollarInput, { value: ytdWritten, onChange: setYtdWritten })),
          h("div", null, h(Lbl, null, "YTD revenue already recognized"), h(DollarInput, { value: ytdRecognized, onChange: setYtdRecognized }))
        ) : null
      )
    );
  }

  function renderProjects() {
    return h(Fragment, null,
      projectTypes.map(function(t, idx) {
        var pctSum = t.prewirePct+t.roughPct+t.finalPct;
        var pctOk = Math.abs(pctSum-100)<1;
        var phaseErrs = [
          t.prewireMonth>t.duration && "Prewire (month "+t.prewireMonth+") exceeds project duration ("+t.duration+" months)",
          t.roughMonth>t.duration   && "Rough-in (month "+t.roughMonth+") exceeds project duration ("+t.duration+" months)",
          t.finalMonth>t.duration   && "Final (month "+t.finalMonth+") exceeds project duration ("+t.duration+" months)"
        ].filter(Boolean);
        return h(Sec, { key: t.id, title: "Project type " + (idx+1) },
          h("div", { className: "name-row" },
            h("input", { type: "text", className: "styled", value: t.name, placeholder: "Project type name", onChange: function(e){updateType(t.id,"name",e.target.value);} }),
            projectTypes.length > 1 ? h("button", { className: "btn btn-remove", onClick: function(){removeType(t.id);} }, "Remove") : null
          ),
          h("div", { className: "grid-3 mb-12" },
            h("div", null, h(Lbl, null, "Avg contract value"), h(DollarInput, { value: t.avgValue, onChange: function(v){updateType(t.id,"avgValue",v);} })),
            h("div", null, h(Lbl, null, "Project duration (months)"), h(NumInput, { value: t.duration, onChange: function(v){updateType(t.id,"duration",Math.max(0.1,v));}, min: 0.1, max: 36, allowDecimal: true })),
            h("div", null, h(Lbl, null, "Sales mix %"), h(NumInput, { value: t.mixPct, onChange: function(v){updateType(t.id,"mixPct",v);}, prefix: "%", min: 0, max: 100, clearOnZero: true }))
          ),
          h("div", { className: "sub-panel" },
            h("div", { className: "sub-panel-title" }, "Phase schedule — month within project & revenue %"),
            h("div", { className: "grid-3" },
              [
                { key: "pw", label: "Prewire",  mf: "prewireMonth", pf: "prewirePct", color: COLORS.prewire },
                { key: "ro", label: "Rough-in", mf: "roughMonth",   pf: "roughPct",   color: COLORS.rough },
                { key: "fi", label: "Final",    mf: "finalMonth",   pf: "finalPct",   color: COLORS.final }
              ].map(function(ph) {
                var over = t[ph.mf] > t.duration;
                return h("div", { key: ph.key },
                  h("div", { style: { display: "flex", alignItems: "center", marginBottom: 6 } },
                    h("span", { className: "phase-dot", style: { background: ph.color } }),
                    h("span", { style: { fontSize: 12, fontWeight: 600, color: "var(--text-muted)" } }, ph.label)
                  ),
                  h("div", { style: { display: "flex", gap: 6 } },
                    h("div", { style: { flex: 1 } },
                      h(Lbl, null, "Month"),
                      h("div", { className: "input-wrap", style: over ? { borderColor: "var(--error)" } : {} },
                        h("input", {
                          type: "number", value: t[ph.mf], min: 1, step: 1,
                          style: { border: "none", background: "transparent", padding: "7px 10px", width: "100%", fontSize: 14, color: over ? "var(--error)" : "var(--text-primary)", outline: "none", fontFamily: "inherit" },
                          onFocus: function(e){setTimeout(function(){e.target.select();},0);},
                          onChange: function(e){var n=parseInt(e.target.value,10); if(!isNaN(n)&&n>=1) updateType(t.id,ph.mf,n);}
                        })
                      )
                    ),
                    h("div", { style: { flex: 1 } },
                      h(Lbl, null, "Rev %"),
                      h(NumInput, { value: t[ph.pf], onChange: function(v){updateType(t.id,ph.pf,v);}, prefix: "%", min: 0, max: 100 })
                    )
                  )
                );
              })
            ),
            phaseErrs.length > 0 ? h("div", { style: { marginTop: 10 } }, phaseErrs.map(function(msg,i){ return h("div",{key:i,className:"pct-err"},"\u26a0\ufe0f "+msg); })) : null,
            !pctOk ? h("div", { className: "pct-err" }, "Phase percentages sum to "+pctSum+"% — must equal 100%") : null
          )
        );
      }),
      h("div", { className: "add-remove-row" },
        projectTypes.length < 5 ? h("button", { className: "btn", onClick: addType }, "+ Add project type") : null,
        h("div", { className: "mix-status " + (totalMix===100?"mix-ok":"mix-err") }, "Sales mix total: "+totalMix+"%"+(totalMix!==100?" (must equal 100%)":""))
      )
    );
  }

  function renderResults() {
    if (allPhaseErrors.length > 0) {
      return h("div", { className: "section", style: { borderColor: "var(--error-border)", background: "var(--error-light)" } },
        h("div", { style: { display: "flex", gap: 10 } },
          h("span", { style: { fontSize: 18 } }, "\u26a0\ufe0f"),
          h("div", null,
            h("div", { style: { fontWeight: 600, fontSize: 14, color: "var(--error)", marginBottom: 8 } }, "Results blocked — phase month errors must be fixed first"),
            h("div", { style: { fontSize: 13, color: "var(--error)", marginBottom: 10 } }, "One or more phase months exceed the project duration. Go to Project types to correct them."),
            allPhaseErrors.map(function(e,i){ return h("div",{key:i,style:{fontSize:13,color:"var(--error)",padding:"4px 0",borderTop:i===0?"1px solid var(--error-border)":"none"}},h("strong",null,e.name+": "),e.msg); })
          )
        )
      );
    }
    if (!calc) return h("div", { className: "notice" }, "Add at least one project type to see results.");
    return h(Fragment, null,
      h("div", { style: { display: "flex", justifyContent: "flex-end", marginBottom: "1rem" } },
        h("button", { className: "btn-pdf", onClick: function(){window.print();} }, "\u2913 Export PDF")
      ),
      h(Sec, { title: "Revenue goal breakdown" },
        h("div", { style: { maxWidth: 500 } },
          h(DRow, { label: "Annual revenue goal", value: fmt(annualGoal), bold: true }),
          h(DRow, { label: "Service revenue deducted ("+servicePct+"% of goal)", value: "- "+fmt(calc.svcRev), color: "var(--text-muted)" }),
          h(DRow, { label: "Carryover pipeline recognized ("+carryoverRecPct+"% of "+fmt(carryoverTotal)+")", value: "- "+fmt(calc.coRev), color: "var(--text-muted)" }),
          includeYTD && ytdRecognized > 0 ? h(DRow, { label: "YTD revenue already recognized", value: "- "+fmt(calc.ytdRec), color: "var(--text-muted)" }) : null,
          h("div", { className: "deduction-row total-row" },
            h("span", { style: { fontWeight: 600 } }, "Revenue needed from new written sales"),
            h("span", { style: { fontWeight: 700, color: "var(--accent)", fontSize: 16 } }, fmt(calc.needFromSales))
          )
        )
      ),
      h("div", { className: "metric-cards" },
        h(MCard, { label: "Monthly written sales needed", value: fmt(calc.moWritten), sub: calc.contractsPer.toFixed(1)+" avg contracts/mo", primary: true }),
        h(MCard, { label: "Annual written sales needed", value: fmt(calc.moWritten*12), sub: "12 x monthly target" }),
        h(MCard, { label: "In-year revenue yield", value: calc.yieldPct.toFixed(1)+"%", sub: "of each written dollar recognized this year" }),
        h(MCard, { label: "Projected in-year revenue", value: fmt(calc.projInYear), sub: "from new written sales Jan-Dec" })
      ),
      h("div", { className: "metric-cards" },
        h(MCard, { label: "Avg monthly revenue target", value: fmt(calc.moRevNeeded), sub: "in-year revenue / 12" }),
        h(MCard, { label: "Service revenue (annual)", value: fmt(calc.svcRev), sub: "excluded from sales target" }),
        h(MCard, { label: "Carryover applied (annual)", value: fmt(calc.coRev), sub: "from prior year pipeline" })
      ),
      h(Sec, { title: "Monthly revenue projection — 36-month horizon" },
        h("p", { className: "helper-text" }, "Revenue from new written sales only, assuming consistent monthly volume. Hover bars for detail."),
        h(MonthlyChart, { data: calc.revArr, currentMonth: currentMonth })
      ),
      h(Sec, { title: "Revenue recognition by phase type" },
        h(PhaseBreakdown, { projectTypes: projectTypes, totalMix: totalMix, monthlyWritten: calc.moWritten })
      )
    );
  }

  function renderPrintPages() {
    return h("div", { className: "print-only" },
      h("div", null,
        h("div", { className: "print-section-label" }, "Setup"),
        renderSetup()
      ),
      h("div", { className: "print-page-break" },
        h("div", { className: "print-section-label" }, "Project types"),
        projectTypes.map(function(t, idx) {
          return h(Sec, { key: t.id, title: "Project type "+(idx+1)+" — "+t.name },
            h("div", { className: "grid-3 mb-12" },
              h("div", null, h(Lbl, null, "Avg contract value"), h(DollarInput, { value: t.avgValue, onChange: function(v){updateType(t.id,"avgValue",v);} })),
              h("div", null, h(Lbl, null, "Duration (months)"), h(NumInput, { value: t.duration, onChange: function(v){updateType(t.id,"duration",v);}, min: 0.1, max: 36, allowDecimal: true })),
              h("div", null, h(Lbl, null, "Sales mix %"), h(NumInput, { value: t.mixPct, onChange: function(v){updateType(t.id,"mixPct",v);}, prefix: "%", min: 0, max: 100 }))
            ),
            h("div", { className: "sub-panel" },
              h("div", { className: "sub-panel-title" }, "Phase schedule"),
              h("div", { className: "grid-3" },
                [
                  { label: "Prewire",  mf: "prewireMonth", pf: "prewirePct", color: COLORS.prewire },
                  { label: "Rough-in", mf: "roughMonth",   pf: "roughPct",   color: COLORS.rough },
                  { label: "Final",    mf: "finalMonth",   pf: "finalPct",   color: COLORS.final }
                ].map(function(ph) {
                  return h("div", { key: ph.label },
                    h("div", { style: { display: "flex", alignItems: "center", marginBottom: 4 } },
                      h("span", { className: "phase-dot", style: { background: ph.color } }),
                      h("span", { style: { fontSize: 12, fontWeight: 600, color: "var(--text-muted)" } }, ph.label)
                    ),
                    h("div", { style: { fontSize: 13 } }, "Month "+t[ph.mf]+" — "+t[ph.pf]+"%")
                  );
                })
              )
            )
          );
        })
      ),
      calc ? h("div", { className: "print-page-break" },
        h("div", { className: "print-section-label" }, "Results"),
        h(Sec, { title: "Revenue goal breakdown" },
          h("div", { style: { maxWidth: 500 } },
            h(DRow, { label: "Annual revenue goal", value: fmt(annualGoal), bold: true }),
            h(DRow, { label: "Service revenue deducted ("+servicePct+"% of goal)", value: "- "+fmt(calc.svcRev), color: "var(--text-muted)" }),
            h(DRow, { label: "Carryover pipeline recognized ("+carryoverRecPct+"% of "+fmt(carryoverTotal)+")", value: "- "+fmt(calc.coRev), color: "var(--text-muted)" }),
            includeYTD && ytdRecognized>0 ? h(DRow, { label: "YTD revenue already recognized", value: "- "+fmt(calc.ytdRec), color: "var(--text-muted)" }) : null,
            h("div", { className: "deduction-row total-row" },
              h("span", { style: { fontWeight: 600 } }, "Revenue needed from new written sales"),
              h("span", { style: { fontWeight: 700, color: "var(--accent)", fontSize: 16 } }, fmt(calc.needFromSales))
            )
          )
        ),
        h("div", { className: "metric-cards" },
          h(MCard, { label: "Monthly written sales needed", value: fmt(calc.moWritten), sub: calc.contractsPer.toFixed(1)+" avg contracts/mo", primary: true }),
          h(MCard, { label: "Annual written sales needed", value: fmt(calc.moWritten*12), sub: "12 x monthly target" }),
          h(MCard, { label: "In-year revenue yield", value: calc.yieldPct.toFixed(1)+"%", sub: "of each written dollar recognized this year" }),
          h(MCard, { label: "Projected in-year revenue", value: fmt(calc.projInYear), sub: "from new written sales Jan-Dec" })
        ),
        h("div", { className: "metric-cards" },
          h(MCard, { label: "Avg monthly revenue target", value: fmt(calc.moRevNeeded), sub: "in-year revenue / 12" }),
          h(MCard, { label: "Service revenue (annual)", value: fmt(calc.svcRev), sub: "excluded from sales target" }),
          h(MCard, { label: "Carryover applied (annual)", value: fmt(calc.coRev), sub: "from prior year pipeline" })
        ),
        h(Sec, { title: "Monthly revenue projection — 36-month horizon" },
          h(MonthlyChart, { data: calc.revArr, currentMonth: currentMonth })
        ),
        h(Sec, { title: "Revenue recognition by phase type" },
          h(PhaseBreakdown, { projectTypes: projectTypes, totalMix: totalMix, monthlyWritten: calc.moWritten })
        )
      ) : null
    );
  }

  return h("div", { className: "app" },
    h("div", { className: "app-header" },
      h("div", { className: "app-header-left" },
        h("img", { src: LOGO_B64, className: "app-logo", alt: "GA logo" }),
        h("div", null,
          h("div", { className: "app-title" }, "Revenue Recognition Calculator"),
          h("div", { className: "app-sub" }, "Custom integration services \u2014 written sales planning tool")
        )
      ),
      activeTab === "setup" ? h("button", { className: "btn btn-reset", onClick: handleReset }, "\u21ba Reset all") : null
    ),
    h("div", { className: "tabs screen-only" },
      tabs.map(function(t) {
        return h("button", { key: t.id, className: "tab-btn"+(activeTab===t.id?" active":""), onClick: function(){setActiveTab(t.id);} }, t.label);
      })
    ),
    activeTab === "setup"   ? h("div", { className: "screen-only" }, renderSetup())   : null,
    activeTab === "projects"? h("div", { className: "screen-only" }, renderProjects()) : null,
    activeTab === "results" ? h("div", { className: "screen-only" }, renderResults())  : null,
    renderPrintPages()
  );
}

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App, null));
</script>
</body>
</html>
